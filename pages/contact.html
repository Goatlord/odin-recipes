            <h1>Contact Us</h1>
            <p>If you have any questions, comments, or feedback, please feel free to reach out to us using the contact form below. We value your input and will do our best to respond to your inquiries in a timely manner.</p>
        </section>

        <section>
            <h2>Contact Form</h2>
            <form action="submit_form.php" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" required></textarea><br><br>

                <input type="submit" value="Submit">
            </form>
